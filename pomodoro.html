<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 360px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Phase indicator */
    .phase-indicator {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* Timer */
    .timer {
      font-size: 72px;
      font-weight: 200;
      color: #111;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 2px;
      background: #f0f0f0;
      border-radius: 1px;
      margin-bottom: 28px;
    }
    .progress-fill {
      height: 2px;
      background: #111;
      border-radius: 1px;
      width: 0%;
      transition: width 0.9s linear;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .btn-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #888;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .btn-circle:hover { border-color: #aaa; color: #555; }
    .btn-circle.primary {
      width: 48px;
      height: 48px;
      background: #111;
      border-color: #111;
      color: #fff;
      font-size: 16px;
    }
    .btn-circle.primary:hover { background: #333; border-color: #333; }

    /* Phase tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #f0f0f0;
      width: 100%;
    }
    .tab {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      padding: 6px 0 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab.active { color: #111; border-bottom-color: #111; }
    .tab:hover:not(.active) { color: #888; }

    /* Stats */
    .stats {
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.3px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="phase-indicator" id="phaseIndicator">FOCUS · 0 / 4</div>
    <div class="timer" id="timerDisplay">25:00</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="controls">
      <button class="btn-circle" id="btnRestart" title="Restart phase">⏮</button>
      <button class="btn-circle primary" id="btnPlayPause">▶</button>
      <button class="btn-circle" id="btnSkip" title="Skip phase">⏭</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="focus">Focus</div>
      <div class="tab" data-tab="break">Break</div>
      <div class="tab" data-tab="long">Long Break</div>
    </div>
    <div class="stats" id="statsRow">Today: 0 🍅 · Streak: 0 · Focus: 0m</div>
  </div>
  <script>
    // JS goes here in subsequent tasks
  </script>
</body>
</html>
