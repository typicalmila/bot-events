<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 360px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Phase indicator */
    .phase-indicator {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* Timer */
    .timer {
      font-size: 72px;
      font-weight: 200;
      color: #111;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 2px;
      background: #f0f0f0;
      border-radius: 1px;
      margin-bottom: 28px;
    }
    .progress-fill {
      height: 2px;
      background: #111;
      border-radius: 1px;
      width: 0%;
      transition: width 0.9s linear;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .btn-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #888;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .btn-circle:hover { border-color: #aaa; color: #555; }
    .btn-circle.primary {
      width: 48px;
      height: 48px;
      background: #111;
      border-color: #111;
      color: #fff;
      font-size: 16px;
    }
    .btn-circle.primary:hover { background: #333; border-color: #333; }

    /* Phase tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid #f0f0f0;
      width: 100%;
    }
    .tab {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      padding: 6px 0 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab.active { color: #111; border-bottom-color: #111; }
    .tab:hover:not(.active) { color: #888; }

    /* Stats */
    .stats {
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.3px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="phase-indicator" id="phaseIndicator">FOCUS · 0 / 4</div>
    <div class="timer" id="timerDisplay">25:00</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="controls">
      <button class="btn-circle" id="btnRestart" title="Restart phase">⏮</button>
      <button class="btn-circle primary" id="btnPlayPause">▶</button>
      <button class="btn-circle" id="btnSkip" title="Skip phase">⏭</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="focus">Focus</div>
      <div class="tab" data-tab="break">Break</div>
      <div class="tab" data-tab="long">Long Break</div>
    </div>
    <div class="stats" id="statsRow">Today: 0 🍅 · Streak: 0 · Focus: 0m</div>
  </div>
  <script>
    // ── Phase cycle ──────────────────────────────────────────────
    const CYCLE = [
      { name: 'FOCUS',      label: 'Focus',      duration: 25 * 60, tab: 'focus' },
      { name: 'BREAK',      label: 'Break',      duration:  5 * 60, tab: 'break' },
      { name: 'FOCUS',      label: 'Focus',      duration: 25 * 60, tab: 'focus' },
      { name: 'BREAK',      label: 'Break',      duration:  5 * 60, tab: 'break' },
      { name: 'FOCUS',      label: 'Focus',      duration: 25 * 60, tab: 'focus' },
      { name: 'BREAK',      label: 'Break',      duration:  5 * 60, tab: 'break' },
      { name: 'FOCUS',      label: 'Focus',      duration: 25 * 60, tab: 'focus' },
      { name: 'LONG BREAK', label: 'Long Break', duration: 15 * 60, tab: 'long'  },
    ];

    // ── App state ─────────────────────────────────────────────────
    let state = 'idle';         // 'idle' | 'running' | 'paused'
    let cycleIndex = 0;
    let focusCount = 0;
    let endTime = null;
    let remainingOnPause = null;
    let tickInterval = null;
    let audioCtx = null;
    let notifPermissionRequested = false;

    // ── DOM refs ──────────────────────────────────────────────────
    const phaseIndicator = document.getElementById('phaseIndicator');
    const timerDisplay   = document.getElementById('timerDisplay');
    const progressFill   = document.getElementById('progressFill');
    const btnRestart     = document.getElementById('btnRestart');
    const btnPlayPause   = document.getElementById('btnPlayPause');
    const btnSkip        = document.getElementById('btnSkip');
    const tabs           = document.querySelectorAll('.tab');
    const statsRow       = document.getElementById('statsRow');

    // ── Helpers ───────────────────────────────────────────────────
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function formatFocusMinutes(mins) {
      if (mins === 0) return '0m';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function currentPhase() { return CYCLE[cycleIndex]; }

    function getRemaining() {
      if (state === 'idle')   return currentPhase().duration;
      if (state === 'paused') return remainingOnPause;
      return Math.max(0, Math.round((endTime - Date.now()) / 1000));
    }

    // ── Tick ──────────────────────────────────────────────────────
    function tick() {
      if (state !== 'running') return;
      const remaining = getRemaining();
      render();
      if (remaining <= 0) {
        onPhaseComplete();
      }
    }

    function startTimer() {
      endTime = Date.now() + currentPhase().duration * 1000;
      state = 'running';
      tickInterval = setInterval(tick, 500);
    }

    function pauseTimer() {
      remainingOnPause = getRemaining();
      clearInterval(tickInterval);
      tickInterval = null;
      state = 'paused';
    }

    function resumeTimer() {
      endTime = Date.now() + remainingOnPause * 1000;
      state = 'running';
      tickInterval = setInterval(tick, 500);
    }

    function onPhaseComplete() {
      clearInterval(tickInterval);
      tickInterval = null;
      // full implementation in Task 6 (Chunk 4) — this stub will be replaced
      advancePhase();
    }

    function advancePhase() {
      const completedPhase = CYCLE[cycleIndex];
      const isFocus = completedPhase.name === 'FOCUS';
      const isLongBreak = completedPhase.name === 'LONG BREAK';

      if (isFocus) focusCount++;
      if (isLongBreak) focusCount = 0;

      cycleIndex = (cycleIndex + 1) % 8;

      endTime = Date.now() + currentPhase().duration * 1000;
      state = 'running';
      tickInterval = setInterval(tick, 500);
      render();
    }

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function requestNotifPermission() {
      if (notifPermissionRequested) return;
      notifPermissionRequested = true;
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    // ── Render ────────────────────────────────────────────────────
    function render() {
      const phase     = currentPhase();
      const remaining = getRemaining();
      const total     = phase.duration;
      const elapsed   = total - remaining;

      // Phase indicator
      phaseIndicator.textContent = `${phase.name} · ${focusCount} / 4`;

      // Page title
      document.title = `${formatTime(remaining)} — ${phase.label}`;

      // Timer
      timerDisplay.textContent = formatTime(remaining);

      // Progress bar
      const pct = total > 0 ? (elapsed / total) * 100 : 0;
      progressFill.style.width = `${pct}%`;

      // Play/pause button icon
      btnPlayPause.textContent = state === 'running' ? '⏸' : '▶';

      // Active tab
      tabs.forEach(t => {
        t.classList.toggle('active', t.dataset.tab === phase.tab);
      });

      // Stats
      renderStats();
    }

    function renderStats() {
      const count   = Number(localStorage.getItem('pomo_today_count') || 0);
      const streak  = Number(localStorage.getItem('pomo_streak') || 0);
      const minutes = Number(localStorage.getItem('pomo_total_minutes') || 0);
      statsRow.textContent =
        `Today: ${count} 🍅 · Streak: ${streak} · Focus: ${formatFocusMinutes(minutes)}`;
    }

    // ── Event listeners ───────────────────────────────────────────
    btnPlayPause.addEventListener('click', () => {
      if (state === 'idle')         { initAudio(); requestNotifPermission(); startTimer(); }
      else if (state === 'running') { pauseTimer(); }
      else if (state === 'paused')  { resumeTimer(); }
      render();
    });

    btnRestart.addEventListener('click', () => {
      clearInterval(tickInterval);
      tickInterval = null;
      state = 'idle';
      remainingOnPause = null;
      endTime = null;
      render();
    });

    btnSkip.addEventListener('click', () => {
      clearInterval(tickInterval);
      tickInterval = null;
      cycleIndex = (cycleIndex + 1) % 8;
      state = 'idle';
      remainingOnPause = null;
      endTime = null;
      render();
    });

    const TAB_CYCLE_INDEX = { focus: 0, break: 1, long: 7 };

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetIndex = TAB_CYCLE_INDEX[tab.dataset.tab];
        clearInterval(tickInterval);
        tickInterval = null;
        cycleIndex = targetIndex;
        state = 'idle';
        remainingOnPause = null;
        endTime = null;
        render();
      });
    });

    // ── Init ──────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
